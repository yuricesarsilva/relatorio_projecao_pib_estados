name: Publicar Painel PIB

on:
  push:
    branches: [main]
    paths:
      - "painel/**"
      - ".github/workflows/publish-painel.yml"
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # R
      - name: Instalar dependências do sistema
        run: sudo apt-get install -y libcurl4-openssl-dev libssl-dev

      - name: Instalar R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: "release"
          use-public-rspm: true

      - name: Instalar pacotes R
        run: |
          Rscript -e 'install.packages(c("knitr", "rmarkdown", "shinylive"),
            repos = c(CRAN = "https://packagemanager.posit.co/cran/__linux__/jammy/latest"))'

      # Quarto CLI
      - name: Instalar Quarto
        uses: quarto-dev/quarto-actions/setup@v2
        with:
          version: "release"

      # Renderizar o painel (CSVs já estão em painel/data/ versionados no repo)
      - name: Renderizar painel Quarto
        run: quarto render painel/painel.qmd --output-dir painel/_site

      # Publicar na branch gh-pages
      - name: Publicar no GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./painel/_site
          publish_branch: gh-pages
          force_orphan: true
          commit_message: "Deploy painel PIB — ${{ github.sha }}"