name: Publicar Painel PIB

on:
  push:
    branches: [main]
    paths:
      - "painel/**"
      - ".github/workflows/publish-painel.yml"
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # R
      - name: Instalar dependências do sistema
        run: sudo apt-get install -y libcurl4-openssl-dev libssl-dev

      - name: Instalar R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: "4.4.0"
          use-public-rspm: true

      - name: Restaurar ambiente renv
        uses: r-lib/actions/setup-renv@v2

      # Quarto CLI
      - name: Instalar Quarto
        uses: quarto-dev/quarto-actions/setup@v2
        with:
          version: "release"

      # CSVs em painel/data/ são gerados localmente via R/run_all.R e
      # commitados antes do push. Ver .github/workflows/rebuild-analytics.yml
      # para o processo de rebuild analítico e instruções de atualização.

      # Renderizar o painel
      - name: Renderizar painel Quarto
        run: cd painel && quarto render painel.qmd --output-dir _site

      # Copiar arquivos extras que o Quarto não copia automaticamente no modo shinylive
      - name: Copiar metodologia.html para _site
        working-directory: painel
        run: |
          echo "Conteúdo de _site:"
          ls _site/
          cp metodologia.html _site/metodologia.html
          echo "Após cópia:"
          ls _site/metodologia.html

      # Publicar na branch gh-pages
      - name: Publicar no GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./painel/_site
          publish_branch: gh-pages
          force_orphan: true
          commit_message: "Deploy painel PIB — ${{ github.sha }}"
